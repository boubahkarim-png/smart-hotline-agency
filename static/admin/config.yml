backend:
  name: git-gateway
  branch: main

media_folder: "static/images"
public_folder: "/images"

collections:
  - name: "pages"
    label: "Pages"
    folder: "content/fr"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Titre", name: "title", widget: "string"}
      - {label: "Description", name: "description", widget: "text", required: false}
      - {label: "Menu principal", name: "menu", widget: "hidden", default: "main", required: false}
      - {label: "Contenu", name: "body", widget: "markdown"}

  - name: "solutions"
    label: "Solutions"
    folder: "content/fr/solutions"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Titre", name: "title", widget: "string"}
      - {label: "Description", name: "description", widget: "text", required: false}
      - {label: "Icône", name: "icon", widget: "string", required: false, default: "📞"}
      - label: "Features"
        name: "features"
        widget: "list"
        required: false
        fields:
          - {label: "Titre", name: "title", widget: "string"}
          - {label: "Description", name: "description", widget: "text"}
      - {label: "Contenu", name: "body", widget: "markdown"}

  - name: "blog"
    label: "Blog"
    folder: "content/fr/blog"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Titre", name: "title", widget: "string"}
      - {label: "Date", name: "date", widget: "datetime"}
      - {label: "Description", name: "description", widget: "text", required: false}
      - {label: "Auteur", name: "author", widget: "string", default: "Smart Hotline", required: false}
      - {label: "Image", name: "image", widget: "image", required: false}
      - {label: "Contenu", name: "body", widget: "markdown"}

  - name: "settings"
    label: "Paramètres"
    files:
      - name: "general"
        label: "Paramètres généraux"
        file: "data/settings.json"
        fields:
          - {label: "Nom du site", name: "siteName", widget: "string", default: "Smart Hotline Agency"}
          - {label: "Téléphone", name: "phone", widget: "string"}
          - {label: "Email", name: "email", widget: "string"}
          - {label: "Adresse", name: "address", widget: "text"}
