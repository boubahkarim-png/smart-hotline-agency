<header class="site-header">
  <div class="container header-inner">
    <a href="/" class="logo">
      <span class="logo-text">Smart Hotline</span>
      <span class="logo-sub">Agency</span>
    </a>

    <div class="header-phone">
      <a href="tel:{{ .Site.Params.phoneRaw }}" class="phone-link">
        <span class="phone-icon">&#9742;</span>
        <span>{{ .Site.Params.phone }}</span>
      </a>
    </div>

    <button class="hamburger" aria-label="Menu" aria-expanded="false">
      <span class="hamburger-line"></span>
      <span class="hamburger-line"></span>
      <span class="hamburger-line"></span>
    </button>

    <nav class="nav-menu" role="navigation" aria-label="Menu principal">
      <ul class="nav-list">
        {{ range .Site.Menus.main }}
          {{ if .HasChildren }}
            <li class="nav-item has-dropdown">
              <a href="{{ .URL }}" class="nav-link">{{ .Name }} <span class="dropdown-arrow">&#9662;</span></a>
              <ul class="dropdown-menu">
                {{ range .Children }}
                  <li><a href="{{ .URL }}" class="dropdown-link">{{ .Name }}</a></li>
                {{ end }}
              </ul>
            </li>
          {{ else if not .Parent }}
            <li class="nav-item">
              <a href="{{ .URL }}" class="nav-link">{{ .Name }}</a>
            </li>
          {{ end }}
        {{ end }}
      </ul>
      <a href="/contact/" class="btn btn-primary header-cta">Obtenir un Devis</a>
    </nav>
  </div>
</header>
